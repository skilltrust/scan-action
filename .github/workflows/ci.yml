name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/run-tests.sh

  smoke-clean:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: tests/fixtures/clean-repo
          fail-on: high

  smoke-malicious:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - id: action
        continue-on-error: true
        uses: ./
        with:
          path: tests/fixtures/malicious-repo
          fail-on: high
      - name: Assert action failed
        if: steps.action.outcome != 'failure'
        run: |
          echo "Expected action to fail on malicious fixture, got outcome=${{ steps.action.outcome }}" >&2
          exit 1

  smoke-pr-comment:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          path: tests/fixtures/malicious-repo
          fail-on: high
          comment: 'true'
        continue-on-error: true
      - name: Assert sticky comment exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          count=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '[.[] | select(.body | startswith("<!-- skilltrust:action:v1 -->"))] | length')
          if [ "$count" -ne 1 ]; then
            echo "Expected exactly 1 marker comment, got $count" >&2
            exit 1
          fi

  smoke-pr-delta:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: action
        continue-on-error: true
        uses: ./
        with:
          path: tests/fixtures/malicious-repo
          fail-on: high
          delta: 'true'
          comment: 'true'
      - name: Assert marker comment posted
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          body=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.body | startswith("<!-- skilltrust:action:v1 -->")) | .body' | head -1)
          if [ -z "$body" ]; then
            echo "Expected marker comment, got none" >&2
            exit 1
          fi
